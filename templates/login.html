{% extends 'base.html' %}
{% block title %}Login – MockMentor{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">🎓</div>
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-sub">Sign in to continue your interview prep journey</p>

        <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
            <div class="mb-3">
                <label class="form-label fw-600">Email Address</label>
                <div class="input-group mm-input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-600">Password</label>
                <div class="input-group mm-input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('password','eyeLogin')">
                        <i class="bi bi-eye" id="eyeLogin"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill mt-2">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <div class="auth-divider my-4"><span>Don't have an account?</span></div>
        <a href="{{ url_for('auth.register') }}" class="btn btn-outline-primary w-100 rounded-pill">Create Account</a>
        <div class="text-center mt-3">
            <a href="{{ url_for('auth.admin_login') }}" class="text-muted small">Admin Login →</a>
        </div>
    </div>
</div>
<script>
function togglePwd(id, iconId) {
    const el = document.getElementById(id);
    const icon = document.getElementById(iconId);
    el.type = el.type === 'password' ? 'text' : 'password';
    icon.className = el.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
{% endblock %}
