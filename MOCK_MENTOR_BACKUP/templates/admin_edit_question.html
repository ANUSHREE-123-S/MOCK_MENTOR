{% extends 'base.html' %}
{% block title %}Edit Question – MockMentor Admin{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a href="{{ url_for('admin.manage_questions') }}" class="btn btn-sm btn-outline-secondary rounded-pill">
                    <i class="bi bi-arrow-left me-1"></i>Back
                </a>
                <h4 class="fw-800 mb-0">Edit Question #{{ question.question_id }}</h4>
            </div>

            <div class="mm-card">
                <div class="p-4">
                    <form method="POST" action="{{ url_for('admin.edit_question', qid=question.question_id) }}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-600">Topic *</label>
                                <select name="topic_id" class="form-select" required>
                                    {% for t in topics %}
                                    <option value="{{ t.topic_id }}"
                                        {% if t.topic_id == question.topic_id %}selected{% endif %}>
                                        {{ t.topic_name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-600">Difficulty *</label>
                                <select name="difficulty_id" class="form-select" required>
                                    {% for d in difficulties %}
                                    <option value="{{ d.difficulty_id }}"
                                        {% if d.difficulty_id == question.difficulty_id %}selected{% endif %}>
                                        {{ d.difficulty_name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-600">Question Text *</label>
                                <textarea name="question_text" class="form-control mm-textarea" rows="4"
                                          required>{{ question.question_text }}</textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-600">Sample Answer</label>
                                <textarea name="sample_answer" class="form-control mm-textarea"
                                          rows="5">{{ question.sample_answer or '' }}</textarea>
                            </div>
                        </div>
                        <div class="d-flex gap-3 mt-4">
                            <button type="submit" class="btn btn-primary flex-grow-1 rounded-pill">
                                <i class="bi bi-save me-2"></i>Update Question
                            </button>
                            <a href="{{ url_for('admin.manage_questions') }}"
                               class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
