{% extends 'base.html' %}
{% block title %}Admin Login – MockMentor{% endblock %}
{% block content %}
<div class="auth-wrapper px-3 px-md-0">
    <div class="auth-card">
        <div class="auth-logo">🛡️</div>
        <h2 class="auth-title">Admin Portal</h2>
        <p class="auth-sub">MockMentor Administration Panel</p>

        <form method="POST" action="{{ url_for('auth.admin_login') }}">
            <div class="mb-3">
                <label class="form-label fw-600">Username</label>
                <div class="input-group mm-input-group">
                    <span class="input-group-text"><i class="bi bi-shield"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="admin" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-600">Password</label>
                <div class="input-group mm-input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-dark w-100 btn-lg rounded-pill mt-2">
                <i class="bi bi-shield-check me-2"></i>Admin Login
            </button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('auth.login') }}" class="text-muted small">← Student Login</a>
        </div>
    </div>
</div>
{% endblock %}
